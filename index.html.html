<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सिर्फ बटन</title>
    <style>
        /* बस बॉडी को सफेद रखा और बटन को सेंटर किया */
        body {
            background: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* बस छोटा लाल बटन — बिल्कुल अकेला */
        .only-red-btn {
            background: #e03a2e;
            border: none;
            border-radius: 40px;
            padding: 0.85rem 2.2rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            letter-spacing: 1.2px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(220, 50, 40, 0.3);
            border: 1px solid #c92e22;
            line-height: 1.2;
        }

        .only-red-btn:hover {
            background: #ce2b20;
        }
    </style>
</head>
<body>
    <!-- केवल बटन, बाकी कुछ नहीं -->
    <button class="only-red-btn" id="magicBtn">CLICK HERE</button>

    <script>
        (function() {
            const btn = document.getElementById('magicBtn');
            let countdown = 2;
            let interval = null;
            let timeout = null;

            function clearTimers() {
                if (interval) clearInterval(interval);
                if (timeout) clearTimeout(timeout);
                interval = null;
                timeout = null;
            }

            function redirect() {
                window.location.href = 'https://live-amber-pi.vercel.app/';
            }

            function startAutoClick() {
                clearTimers();

                // हर सेकंड काउंटडाउन (यहां कोई दिखता नहीं, सिर्फ लॉजिक)
                interval = setInterval(() => {
                    countdown -= 1;
                    if (countdown <= 0) {
                        clearTimers();
                        redirect();
                    }
                }, 1000);

                timeout = setTimeout(() => {
                    redirect();
                }, 2000);
            }

            // पेज लोड होते ही 2 सेकंड बाद रीडायरेक्ट
            window.addEventListener('load', startAutoClick);

            // बटन दबाने पर तुरंत रीडायरेक्ट
            btn.addEventListener('click', function(e) {
                clearTimers();
                redirect();
            });

            window.addEventListener('beforeunload', clearTimers);
        })();
    </script>
</body>
</html>
